services:
  memos:
    build:
      context: .
      dockerfile: dockerfile
    image: memos-local:test
    container_name: memos
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "5230:5230"
    volumes:
      - ./data:/var/opt/memos
    environment:
      MEMOS_PORT: "${MEMOS_PORT}"
      MEMOS_DRIVER: "${MEMOS_DRIVER}"
      MEMOS_DSN: "${MEMOS_DSN}"
      MEMOS_INSTANCE_URL: "${MEMOS_INSTANCE_URL}"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:5230/healthz | grep -q 'Service ready.'"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  postgres:
    image: postgres:16
    container_name: memos-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: "${POSTGRES_DB}"
      POSTGRES_USER: "${POSTGRES_USER}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  postgres_data: